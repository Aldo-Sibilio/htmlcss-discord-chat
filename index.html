<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="app">
        <div class="sidebar">
            <img src="./img/logo.webp" alt="Logo Discord">
            <img src="./img/server arte.png">
            <img src="./img/server_boolean.png">
            <img src="./img/server_italia.png">
            <img src="./img/server_nintendo.png">
            <img src="./img/server_javascript.png">
            <img src="./img/server_pokemon.png">
        </div>

        <div class="chat">
            <header class="chat-header">
                <h1>Messaggi</h1>
                <div class="search-bar">
                    <i class="bi bi-search"></i>
                    <span class="search-text">Aggiungi amici</span>
                </div>
            </header>
            <section class="chat-list">
                
            </section>
            <footer class="chat-footer">
            </footer>
        </div>
    </div>

</body>

</html>
